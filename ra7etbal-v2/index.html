<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5EFE4" />
    <meta name="application-name" content="Ra7etBal" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ra7etBal" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Ra7etBal · راحة بال</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icons/ra7etbal-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/ra7etbal-icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Canonical-domain redirect — must run before any module script so the
      Supabase PKCE code_verifier (stored in localStorage) is always written
      under the ra7etbal.com origin. If the user lands on www.ra7etbal.com the
      code_verifier is stored there; the reset email redirects to ra7etbal.com;
      the exchange silently fails because the two origins have separate storage.
      Redirecting www → non-www here, preserving path + query + hash, fixes it.
    -->
    <script>
      if (location.hostname === 'www.ra7etbal.com') {
        location.replace(
          'https://ra7etbal.com' + location.pathname + location.search + location.hash
        );
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
