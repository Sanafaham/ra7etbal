<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ra7etBal</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f7f3ed;
  color: #3d3126;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 24px;
  box-sizing: border-box;
}

.logo {
  font-size: 32px;
  font-weight: 600;
  margin-top: 20px;
}

.subtitle {
  color: #8b7d6b;
  margin-top: 8px;
  line-height: 1.5;
}

textarea {
  width: 100%;
  height: 180px;
  margin-top: 24px;
  border-radius: 20px;
  border: 1px solid #d8cec1;
  padding: 20px;
  font-size: 18px;
  box-sizing: border-box;
  background: white;
}

button {
  width: 100%;
  height: 60px;
  border: none;
  border-radius: 18px;
  background: #6f8753;
  color: white;
  font-size: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
  border: 1px solid #e5ddd2;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">
🌿 Ra7etBal
</div>

<div class="subtitle">
Get everything out of your head.
</div>

<textarea id="mainInput" placeholder="Type anything on your mind"></textarea>

<button onclick="testSave()">
Save Test
</button>

<div class="card" id="output">
Nothing saved yet.
</div>

</div>

<script>
function testSave() {
  const text = document.getElementById('mainInput').value;

  document.getElementById('output').innerHTML =
    text || 'Nothing entered.';
}
</script>

</body>
</html>
